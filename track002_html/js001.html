    <h1>001. 출력</h1>
    <ul>
      <li>document.write("문자열")</li>
      <li>console.log("문자열")</li>

  <div class="container card my-3">
    <h2 class="card-header">출력</h2>

      <script>
        ////////////////////////// 여기 실습
        document.write('<p class = "text-primary">hello.js</p>');
        // 브라우저-개발자모드(F12)-console 탭
        console.log("안녕 js")

        console.log("김보라")

  <!--                                    -->
  <!--                                    -->
  <!-- 배경원하는색, 글자색white, 안쪽여백-3  -->
  <div class="bg-primary text-white p-3">
    <h1>002. 변수 : var, let, const</h1>
    <ul>
      <li>var 전역변수 </li>
      <li>let 지역변수 </li>
      <li>const 상수 </li>
    </ul>
  </div><!-- end div-->
  <div class="container card my-3">
    <h2 class="card-header">step1 : var 사용법</h2>
    <div class="card-body">
      <script>
        //java 에서는 자료형을 선언해줘야 했는데, javascript에서는 
        //자료형 구분없이 변수에 할당만 해주면 됨
        //1. 전역변수 - 다시 선언시 덮어씀  
        ////////////////////////// 여기 실습
        var global; // 선언-자바스크립트 엔진 변수명을 알려줌
        console.log(global); //undefined
        global = 123; // 사용
        global = "abc"; // 사용
        global = 1.23;
        document.write(global);
      </script>
    </div>
    <h2 class="card-header">step2 : var , let, const</h2>
    <div class="card-body">
      <script>
        ////////////////////////// 여기 실습
        //1. var(전역)
        var global = 10; console.log(global);
        //2. let(지역) 변수 중복선언 불가
        let local = 10; console.log(local);
        // let local=20; console.log(local); //error
        local = 20; console.log(local);
        //3. const(상수) 변하는 안되는 값
        const const1 = 30;
        const1 = 40; console.log(const1);
        //js001.html:77 Uncaught TypeError: Assignment to constant variable.
      </script>
    </div>
  </div>

  <!--                                    -->
  <!--                                    -->
  <!-- 배경원하는색, 글자색white, 안쪽여백-3  -->
  <div class="bg-primary text-white p-3">
    <h1>003. 자료형, 자료형확인 (typeof)</h1>
    <ul>
      <li>자료형 </li>
      <li>자료형확인(typeof) </li>
    </ul>
  </div><!-- end div-->
  <div class="container card my-3">
    <h2 class="card-header">자료형실습</h2>
    <div class="card-body">
      <script>
        ////////////////////////// 여기 실습
        //자바스크립트의 변수는 모든 자료형을 담을 수 있구나
        let data1; console.log(data1);
        data1 = 10; console.log(data1); //10
        data1 = 3.14; console.log(data1); //3.14
        data1 = true; console.log(data1); //true
        data1 = "abc"; console.log(data1); //abc
        data1 = ["sally", 7]; console.log(data1);
        /*['sally', 7]
            0: "sally"
            1: 7
            length: 2*/
        data1 = {}; console.log(data1); // {}
        data1 = function () { }; console.log(data1); //function () { }

        data1 = 10; console.log(data1);
        console.log(data1 + "10"); //1010 -> 원하는 결과물20
        console.log(typeof(data1) ,"/", typeof("10")); // typeof 자료형확인함수
                    //number            string
        console.log(data1 + Number("10")); // 해결
      </script>
    </div>
  </div>


</body>

</html>

#4. 변수는 모든 자료형을 담을 수 있다. 자료형확인은 typeof

-->
