<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="./css/style.css" rel="stylesheet" />
  </head>

  <body>
    <!--Q.navbar 좋아하는 색상주기-->
    <nav class="navbar navbar-expand-sm navbar-dark bg-warning">
      <div class="container-fluid">
        <a class="navbar-brand" href="javascript:void(0)">Logo</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mynavbar"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mynavbar">
          <ul class="navbar-nav me-auto">
            <li class="nav-item">
              <a class="nav-link" href="javascript:void(0)">Link</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="javascript:void(0)">Link</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="javascript:void(0)">Link</a>
            </li>
          </ul>
          <form class="d-flex">
            <input class="form-control me-2" type="text" placeholder="Search" />
            <button class="btn btn-primary" type="button">Search</button>
          </form>
        </div>
      </div>
    </nav>
    <!-- div: 중앙배치 바깥쪽여백(위아래)-3 -->
    <!--Q.border(컴포넌트) 좋아하는 색상주기-->
    <div class="container my-3 p-5 border border-warning border-3 rounded">
      <!--container가 이미 마진이 들어가있어서 m을주면 추가로 줘버림-->
      <h3>1. CSS - 색상</h3>
      <p class="alert alert-success">
        사용방법 : btn(컴포넌트) btn-primary(색상)
      </p>
      <p class="bg-primary text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-success text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-info text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-warning text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-danger text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-secondary text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-dark text-white p-3 rounded">bg-배경색, text-글자색</p>
      <p class="bg-light text-dark p-3 rounded">bg-배경색, text-글자색</p>

      <button class="btn btn-primary">primary</button>
      <button class="btn btn-success">success</button>
      <button class="btn btn-info">info</button>
      <button class="btn btn-warning">warning</button>
      <button class="btn btn-danger">danger</button>
      <button class="btn btn-secondary">secondary</button>
      <button class="btn btn-dark">dark</button>
      <button class="btn btn-light">light</button>
      <br /><br />
      <button class="btn btn-outline-primary">Primary</button>
      <button class="btn btn-outline-success">success</button>
      <button class="btn btn-outline-info">info</button>
      <button class="btn btn-outline-warning">warning</button>
      <button class="btn btn-outline-danger">danger</button>
      <button class="btn btn-outline-secondary">secondary</button>
      <button class="btn btn-outline-dark">dark</button>
      <button class="btn btn-outline-light text-dark">light</button>
    </div>
  </body>
</html>
