<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container{
        position: relative;
      }
      .fixed .box{
        position: absolute;
        top: 0;
        left: 0;
        background-color: aqua;
      }
    </style>
  </head>

  <body>
    <div class="container fixed">
      <h3>예제 4: position fixed</h3>
      <div class="box">FIXED</div>
      <p>브라우저 화면(viewport)을 기준으로 항상 같은 위치에 고정됩니다.</p>
    </div>
</html>
