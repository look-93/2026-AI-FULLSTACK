<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>004 .layout - float</title>
    <style>
        /* Q1. ul 태그의 기본 목록 스타일 제거, 안쪽/바깥 여백 없애기 */
        * {margin:0; padding:0; }

        body{  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-image:linear-gradient(135deg, #f4ffb8 , #8affd0);
        }
        h2{ border-left:10px solid #123456; 
        border-bottom:1px solid #123456;
        margin:5px 0; padding-left:20px;
        }
        .container{  width:50%; margin:50px auto;   border-radius: 10px;
        background-color:#fff;  padding:20px;  box-shadow:0 0 10px rgba(0,0,0,0.2); overflow: hidden; /*clear : both*/}
        /* Q2. li 태그는 왼쪽으로 나란히 배치(float:left), 바깥 여백(10px) */

        ul{
            width: 40%;
            list-style: none;
            background-color: rgb(217, 200, 126);
            overflow: hidden; /*넘치는 컨텐츠를 묶어줌*/
        }

        /* li{
            float: left;
            margin: 10px;
        } */
        .t1{
            float: left;           
        }
        .t2{
            float: right;          
        }
    
        /* Q3. img 너비/높이(100px), 원형(border-radius:50%), 테두리(3px solid #ff6600),
        전환 효과(transform, border-color 각각 0.8s) */
        .item img{
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #ff6600;

            transition: transform 0.8s, border-color 0.8s;
        }
        /* Q4. 첫 번째 얼굴: 마우스 오버 시 위로 점프(translateY(-20px)), 테두리 색(#00ccff) */
        ul.t1 li:first-child img:hover{
            transform: translateY(-20px);
            border-color: #00ccff;            
        } 
 
        /* Q5. 두 번째 얼굴: 마우스 오버 시 좌우 흔들기(rotateZ(20deg)), 테두리 색(#33cc33) */
        ul.t1 li:nth-child(2) img:hover{
            transform: rotateZ(20deg);
            border-color: #33cc33;         
        } 
        /* .b:hover{
            transform: rotateZ(20deg);
            border-color: #33cc33;

        } */

        /* Q6. 세 번째 얼굴: 마우스 오버 시 X축 뒤집기(rotateX(180deg)), 테두리 색(#ff33aa) */
        ul.t1 li:nth-child(3) img:hover{
            transform: rotateX(180deg);
            border-color: #ff33aa;       
        } 
        /* .c:hover{
            transform: rotateX(180deg);
            border-color: #ff33aa;
     
        }        */
        /* Q7. 네 번째 얼굴: 마우스 오버 시 Y축 뒤집기(rotateY(180deg)), 테두리 색(#ffaa00) */
        ul.t1 li:nth-child(4) img:hover{
            transform: rotateY(180deg);
            border-color: #ffaa00;
        } 
        /* .d:hover{
            transform: rotateY(180deg);
            border-color: #ffaa00;
       
        }         */
        /* Q8. 마지막 얼굴: 마우스 오버 시 빙글빙글 회전(rotate(360deg) scale(1.2)), 테두리 색(#6600ff) */

         ul.t1 li:last-child img:hover{
            transform: rotate(360deg) scale(1.2);
            border-color: #6600ff;          
        } 
       
    </style>
</head>
<body>
    <div class="container">
        <h2>어벤져스</h2>
        <ul class="t1">
            <li class="item a"><img src="./img/one.png" alt="이미지1"></li>
            <li class="item b"><img src="./img/two.png" alt="이미지2"></li>
            <li class="item c"><img src="./img/three.png" alt="이미지3"/></li>
            <li class="item d"><img src="./img/four.png" alt="이미지4"/></li>
            <li class="item e"><img src="./img/five.png" alt="이미지5"/></li>    
        </ul>
            <ul class="t2">
            <li ><img src="https://picsum.photos/100?random=1" alt="이미지1"></li>
            <li ><img src="https://picsum.photos/100?random=1" alt="이미지2"></li>
            <li ><img src="https://picsum.photos/100?random=1" alt="이미지3"/></li>
            <li ><img src="https://picsum.photos/100?random=1" alt="이미지4"/></li>
            <li ><img src="https://picsum.photos/100?random=1" alt="이미지5"/></li>                             
        </ul>        
    </div>
    
</body>
</html>
