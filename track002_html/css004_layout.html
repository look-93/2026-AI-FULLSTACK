<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>004 .layout - float</title>
    <style>
        *{padding: 0; margin: 0;}
        body{
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-image: linear-gradient(135deg, rgb(238, 251, 255), rgb(219, 238, 182));
        }
        h3{
            border-left: 10px solid rgb(243, 197, 197);
            border-bottom: 1px solid rgb(219, 238, 182);
            margin: 30px 0;
            padding-left: 20px;
        }
        .container{
            width: 50%; margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            
        }
        .item{background-color: #333; color: white; padding: 10px;}
        .f1{
            float:left; background-color: red;
        }
        .f2{
            float:right;
            background-color: blue;
        }
        .f3{
            clear:both /*속성끊기:딸려올라가지x*/
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>1. block vs inline</h3>
        <dl>
            <dt>block</dt>
            <dd>width ,줄바꿈: o</dd>
            <dt>inline</dt>
            <dd>width ,줄바꿈: x</dd>
        </dl>
    </div>

    <div class="container">
        <h3>2. 배치</h3>
        <ul>
            <li>float : 왼쪽이나 오른쪽 옆에 붙이기(끊기-clear:both)</li>
            <li>position : 정확한 자리를 정해서 붙이기(좌표)</li>
            <li>display : 블록에 줄서기, 속성바꾸기</li>
        </ul>
    </div>

    <div class="container f">
        <h3>3. 배치(1) - float(나머지 속성들은 딸려 올라감)</h3>
        <p class="item f1">LEFT<span>(왼쪽)</span></p>
        <p class="item f2">RIGHT<span>(오른쪽)</span></p>
        <p class="item f3">float속성끊기-clear:both / overflow:hidden</p>
    </div>

</body>
</html>
