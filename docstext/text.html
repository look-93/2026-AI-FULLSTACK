<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- Latest compiled and minified CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="./css/board.css" rel="stylesheet" />
  </head>

  <body>
    <section class="hero">
      <!-- LEFT -->
      <div class="left">
        <h1>Hi, I'm</h1>
        <h2>FullStack 개발자</h2>

        <p>
          사용자 경험을 고민하는 풀스택 개발자입니다.<br />
          SQL을 활용한 데이터 분석과 백엔드 개발에 강점을 가지고 있습니다.
        </p>
        <div class="find">
          <h4>FIND WITH ME</h4>
          <div class="icon-wrap">
            <div class="icon-card">
              <img src="./img/github.png" alt="github" />
            </div>
          </div>

          <!-- EXPERIENCE 카드 -->
          <div class="experience-card">
            <h2>2+</h2>
            <p>Years Experience</p>
          </div>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="right">
        <div class="profile">
          <img src="./img/profile.png" alt="profile" />
        </div>

        <div class="skills-card">
          <h4>SKILLS</h4>

          <div class="skill-group">
            <span>Frontend</span>
            <div class="icons">
              <div class="icon-card">JS</div>
              <div class="icon-card">R</div>
              <div class="icon-card">C</div>
            </div>
          </div>

          <div class="skill-group">
            <span>Backend</span>
            <div class="icons">
              <div class="icon-card">J</div>
              <div class="icon-card">S</div>
            </div>
          </div>

          <div class="skill-group">
            <span>Database</span>
            <div class="icons">
              <div class="icon-card">M</div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
