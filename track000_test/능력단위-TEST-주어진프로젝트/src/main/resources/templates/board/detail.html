<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{fragments/layout}">
<!-- 	#1. layout 렌더링	 -->
<head lang="ko">
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
 	<div  layout:fragment="content"> 
	   <div class="card  my-5 p-4">
	   <!-- CSRF 토큰을 위한 메타 태그 -->
	    <meta name="_csrf" th:content="${_csrf.token}"/>
	    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
	    <div th:if="${success}" class="alert alert-info alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
 	
      <h3 class="card-header"> MBTI  QUEST 상세보기</h3>
	
			<div class="card my-3 p-3">
			    <button type="button" id="btnAiTag" class="btn btn-outline-primary btn-sm">AI 해시태그 생성</button>
			    <div id="aiTagResult" class="mt-2 text-primary fw-bold"></div>
			</div>
			
			<script>
			document.getElementById('btnAiTag').addEventListener('click', function() {
			    const content = document.getElementById('content').value;
			    const resultDiv = document.getElementById('aiTagResult');
			    
			    // CSRF 토큰 정보 가져오기
			    const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
			    const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");
			    
			    resultDiv.innerText = 'AI가 분석 중입니다...';
			
			    fetch('/board/openai', {
			        method: 'POST',
			        headers: { 
			            'Content-Type': 'application/json',
			            [header]: token  
			        },
			        body: JSON.stringify(content)  
			    })
			    .then(response => response.json())
			    .then(data => {   
			    	resultDiv.textContent = data.content;
			    })
			    .catch(error => {
			        resultDiv.innerText = '태그 생성 실패';
			        console.error('Error:', error);
			    });
			});
			</script>
	
	
	  <div> 
	      <input type="hidden"   name="app_user_id"  value=""> 
		  <div class="mb-3 mt-3">
		    <label for="hit" class="form-label">조회수</label>
		    <input type="text" class="form-control" id="hit" name="hit"  readonly th:value="${dto.bhit}">
		  </div> 
		  <div class="mb-3 mt-3">
		    <label for="title" class="form-label">TITLE:</label>
		    <input type="text" class="form-control" id="title" 
		    		placeholder="내용을 입력해주세요" name="title"  readonly  th:value="${dto.btitle}">
		  </div>  
		  <div class="mb-3">
		    <label for="content" class="form-label">CONTENT:</label>
		    <textarea class="form-control" id="content" placeholder="내용을 입력해주세요"  
		    	readonly name="content"  th:text="${dto.bcontent}" ></textarea>
		  </div> 
		  <div class="mb-3 mt-3">
		    <label for="title" class="form-label">IMG:</label>
			<img  th:src="@{|/upload/${dto.bfile}|}"   alt=""/>
		  </div> 
			<div class="mb-3">
			  <a th:href="@{/board/edit(id=${dto.id})}" class="btn btn-success form-control">글수정</a>
			</div>
			<div class="mb-3">
			  <a th:href="@{/board/delete(id=${dto.id})}" class="btn btn-secondary form-control">글삭제</a>
			</div>  
		    <div class="mb-3">
		  	  <a th:href="@{/board/list}" class="btn btn-primary form-control">목록보기</a>
		    </div>
		    

		    
	 </div>
   </div> 
</div>
</body>
</html>
