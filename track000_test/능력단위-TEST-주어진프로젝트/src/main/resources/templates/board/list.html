<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{fragments/layout}">
<!-- 	#1. layout 렌더링	 -->
<head lang="ko">
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
 	<div  layout:fragment="content"> 
        
        
        
        
        <div th:if="${success}" class="alert alert-info alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
 	    
 	    
	       
			<!-- 	#####	Q2	   -->  
	       <!-- 검색 영역 -->
			<div class="d-flex my-3">
			    <!-- input 하나만 사용 -->
			    <input type="text" id="keyword" class="form-control me-2" placeholder="검색어를 입력하세요">
			    <button type="button" id="btnSearch" class="btn btn-secondary" onClick="search()">검색</button>
			</div>
			
			<script>
			 	function search() {
			 		//console.log("ddd")
			 		const keyword = document.getElementById("keyword").value;
			 		const pageNo = 1; // 검색하면 보통 첫 페이지
			 		fetch(`/board/search?keyword=${encodeURIComponent(keyword)}&pageNo=${pageNo}`)
			 		.then(res=>res.json())
			 		.then(data=>{
			 			//console.log(data);
			 			
			 			let html = "";
			 			
			 			data.list.forEach((dto, i)=>{
			 				const no = data.paging.listtotal 
					           - ((data.paging.current - 1) * data.paging.onepagelist) 
					           - i;
			 				
			 				html += `
			 				<tr>
			 					<td>${no}</td>
			 					
		                        <td>
	                            <a href="/board/detail?id=${dto.id}">
	                                ${dto.btitle}
	                            </a>
		                        </td>
		                        <td>${dto.appUserId}</td>
		                        <td>${dto.createdAt}</td>
		                        <td>${dto.bhit}</td>
			 				</tr>
			 				`;
			 			});
			 			document.getElementById("boardList").innerHTML = html;
			 		})
			 		.catch(err =>{
			 			console.log(err);
			 		});
			 	}			
			</script>	       		
				       
				       
 	    
 	    
 	    
	   <div class="card  my-5 p-4">
	      <h3 class="card-header"> MBTI QUEST BOARD</h3>    
	      <table class="table table-striped table-bordered table-hover">
	      	<caption>mbti </caption>
	      	<thead>
	      		<tr>
	      			<th scope="col">NO</th>
	      			<th scope="col">TITLE</th>
	      			<th scope="col">NAME</th>
	      			<th scope="col">DATE</th>
	      			<th scope="col">HIT</th>
	      		</tr>	
	      	</thead>
	      	<tbody id="boardList">
<!-- 
INSERT INTO sboard2 (ID, APP_USER_ID, BTITLE, BCONTENT, BPASS, BIP, CREATED_AT) 
SELECT (SELECT NVL(MAX(ID), 0) FROM sboard2) + ROWNUM, APP_USER_ID, BTITLE, BCONTENT, BPASS, BIP, SYSDATE FROM sboard2;

commit;
 -->
<!--  http://localhost:8080/board/list?pageNo=1 -->
<!--  http://localhost:8080/board/list?pageNo=2 -->
	      	    <!--  12-  i--  / 2 - i-- -->
	      	    <!-- UtilPaging(listtotal=12, onepagelist=10, pagetotal=2, bottomlist=10, pstartno=1, current=1, start=1, end=2) -->
		      	<tr  th:each="dto , i  :  ${list}">
		      		<td  th:text="${paging.listtotal - ((paging.current-1)* paging.onepagelist) - i.index}"></td>
		      		<td> <!--    http://localhost:8080/board/detail?id=67 -->
		      			<a th:href="@{/board/detail(id=${dto.id})}" th:text="${dto.btitle}"></a>
		      		</td>
		      		<td  th:text="${dto.appUserId}"></td>
		      		<td  th:text="${dto.createdAt}"></td>
		      		<td  th:text="${dto.bhit}"></td>
		      	</tr>
	      	</tbody>
	      </table>   
	      <ul  class="pagination   justify-content-center">
	      	<!-- 이전 11 -->
	        <li  class="page-item"   th:if="${paging.start > 1}"  >
	      		<a class="page-link"  
	      		   th:href="@{/board/list(pageNo=${paging.start - 1})}" >이전</a>
	      	</li> 
	      	
	      	<!-- 1,2,3,4,5,6,7,8,10 -->
	      	<li  class="page-item"  
	      	     th:each="pageNum :${#numbers.sequence(paging.start , paging.end)}"  
	      	     th:classappend="${pageNum == paging.current} ? 'active' "
	      	>
	      		<a class="page-link"  
	      		   th:text="${pageNum}"   th:href="@{/board/list(pageNo=${pageNum})}" ></a>
	      	</li>
	      	
	      	<!-- 다음 -->
	        <li  class="page-item"   th:if="${paging.end < paging.pagetotal}"  >
	      		<a class="page-link"  
	      		   th:href="@{/board/list(pageNo=${paging.start + paging.bottomlist})}" >다음</a>
	      	</li> 
	      </ul>
	       
			<!-- 	#####	Q1	   -->  
			<p class="text-end" sec:authorize="isAuthenticated()">
			    <a th:href="@{/board/write}" class="btn btn-primary">글쓰기</a>
			</p>
			
			<!-- 안내 메시지: 로그인하지 않은(익명) 사용자에게만 보임 -->
			<p class="text-end alert alert-primary" sec:authorize="isAnonymous()">
			    로그인을 하면 글쓰기가 가능합니다.
			</p>
	   </div> 
	</div>
</body>
</html>
